services:
  app:
    build: .
    image: bmad-experiment:local
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/todos.db"
      NODE_ENV: production
    volumes:
      - todos-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  todos-data: {}
